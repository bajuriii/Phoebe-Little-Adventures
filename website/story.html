<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>Story</title>
    <link rel="stylesheet"
          href="css/style.css">
</head>

<body>

<nav class="navbar">
    <div class="logo">
        🌈 Phoebe
    </div>

    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="books.html">Stories</a>
        <a href="favorites.html">❤️ Favorites</a>
    </div>
</nav>

<main class="story-page">
    <div class="book">
        <div class="book-image">
            <img
                id="story-image"
                src="images/phoebe.png"
                alt="Phoebe">
        </div>

        <div class="book-text">
            <h1 id="story-title">
                Phoebe Meets The Rainbow
            </h1>

            <div class="reader-action-slot" aria-hidden="true"></div>

            <p id="story-content">
                One sunny morning, Phoebe saw a beautiful rainbow after the rain.
                She became curious. She wondered where rainbows come from...
            </p>
        </div>

        <div class="story-navigation">
            <div
                class="reader-progress"
                aria-hidden="true">
                <div
                    class="reader-progress-fill"
                    id="reader-progress-fill">
                </div>
            </div>

            <button
                id="prev-btn"
                class="btn-secondary"
                aria-label="Read previous story"
                disabled>
                ← Previous
            </button>

            <div
                class="page-number"
                id="page-number"
                aria-live="polite">
                Page 1 of 2
            </div>

            <button
                id="next-btn"
                class="btn-primary"
                aria-label="Read next story">
                Next →
            </button>
        </div>
    </div>
</main>

<footer class="footer">
    <p>
        Phoebe's Little Adventures © 2026
    </p>
</footer>

<script src="js/story-data.js"></script>
<script src="js/story.js"></script>

</body>

</html>
